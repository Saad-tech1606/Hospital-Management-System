<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register OPD</title>
    <link rel="stylesheet" href="admin_OPD.css">

</head>
<body>
    <h1>OPD Registration Management</h1>
    <div id="form-section">
        <h3>Add/Update Record</h3>
        <div class="form-control">
            <label>Name: </label><input type="text" id="name" />
        </div>
        <div class="form-control">
            <label>Email: </label><input type="email" id="email" />
        </div>
        <div class="form-control">
            <label>Address: </label><input type="text" id="address" />
        </div>
        <div class="form-control">
            <label>Age: </label><input type="number" id="age" />
        </div>
        <div class="form-control">
            <label>Phone: </label><input type="text" id="phone" />
        </div>
        <div class="form-control">
            <label>Gender: </label><input type="text" id="gender" />
        </div>
        <div class="form-control">
            <label>Cause of Admission: </label><input type="text" id="cause" />
        </div>
        <div class="form-control">
            <label>Registration Date: </label><input type="date" id="date" />
        </div>
        <button onclick="addOrUpdate()">Add/Update</button>
    </div>
    <h2>Registered Records</h2>
    <table id="opd-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Address</th>
                <th>Age</th>
                <th>Phone</th>
                <th>Gender</th>
                <th>Cause</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="admin_OPD.js"></script>
</body>
</html>
