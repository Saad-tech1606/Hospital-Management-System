<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bed Allotment - Hospital</title>
    <link rel="stylesheet" href="allotment.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="background">
        <div class="container">
            <div class="header">
                <img src="Hospital bed image.webp" alt="Hospital Banner" class="banner-image">
            </div>

            <h1 class="title">Patient Bed Allotment</h1>
            <p class="description">Effortlessly assign beds and manage ward details with ease.</p>

            <form id="allotmentForm" class="allotment-form">
                <div class="input-group">
                    <label for="patient">Patient Name:</label>
                    <input type="text" id="Name" name="Name" placeholder="Enter patient name" required>
                </div>
                <div class="input-group">
                    <label for="Address">Address:</label>
                    <input type="text" id="Address" name="Address" placeholder="Enter full Address" required>
                </div>
                <div class="input-group">
                    <label for="Email">Email ID:</label>
                    <input type="email" id="Email" name="Email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label for="Age">Age:</label>
                    <input type="number" id="Age" name="Age" min="1" max="120" placeholder="Enter your age" required>
                </div>
                <div class="input-group">
                    <label for="PhoneNumber">Phone Number:</label>
                    <input type="tel" id="PhoneNumber" name="PhoneNumber" placeholder="Enter your phone number" required>
                </div>
                <div class="input-group">
                    <label for="Gender">Gender:</label>
                    <select id="Gender" name="Gender" required>
                        <option value="">Select your gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="BloodGroup">Blood Group:</label>
                    <select id="BloodGroup" name="BloodGroup" required>
                        <option value="">Select your blood group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
                <div class="form-floating">
                    <select class="form-select" id="Department" name="Department" required>
                      <option value="">Select the Department for treatment</option>
                      <option value="Cardiology">Cardiology</option>
                      <option value="Obstetrics and Gynaecology">Obstetrics and Gynaecology</option>
                      <option value="ENT">ENT</option>
                      <option value="Dermatology">Dermatology</option>
                      <option value="Neurology">Neurology</option>
                      <option value="Hematology">Hematology</option>
                      <option value="Opthalmology">Opthalmology</option>
                      <option value="Orthopedics">Orthopedics</option>
                      <option value="Dentist">Dentist</option>
                      <option value="Pediatrician">Pediatrician</option>
                    </select>
                    <label for="Department"></label>
                  </div>
                <button type="submit" class="submit-btn">Allocate Bed</button>
            </form>

            <button onclick="window.location.href='landing.html'" class="back-btn">Back to Landing Page</button>
        </div>
    </div>

    <script>
        const form = document.getElementById('allotmentForm');
        form.addEventListener('submit', async (event) => {
            event.preventDefault(); // Prevent form from refreshing the page

            // Gather form data
            const formData = {
                Name: document.getElementById('Name').value,
                Address: document.getElementById('Address').value,
                Email: document.getElementById('Email').value,
                Age: document.getElementById('Age').value,
                PhoneNumber: document.getElementById('PhoneNumber').value,
                Gender: document.getElementById('Gender').value,
                BloodGroup: document.getElementById('BloodGroup').value,
                Department: document.getElementById('Department').value
            };

            try {
                // Make POST request to the backend
                const response = await axios.post('https://hm-backend-hy5d.onrender.com/admitP/admitP_insert', formData);
                alert('Bed successfully allocated for the patient!');
                console.log(response.data);
                form.reset(); // Reset the form after submission
            } catch (error) {
                console.error('Error submitting the form:', error);
                alert('Failed to allocate bed. Please try again.');
            }
        });
    </script>
</body>
</html>
